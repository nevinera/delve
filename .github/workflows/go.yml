name: Go

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: game-server/go.mod

      - run: go test ./...
        working-directory: game-server

  vet:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: game-server/go.mod

      - run: go vet ./...
        working-directory: game-server
